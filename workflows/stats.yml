name: GitHub-Profile-Stats

on:
  schedule:
    - cron: "0 */12 * * *"   # Every 12 hours
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Generate GitHub Stats
        uses: anuraghazra/github-readme-stats@master
        with:
          username: ziad-zizo77
          theme: tokyonight
          hide_border: true
          show_icons: true

      - name: Commit changes
        run: |
          git config --global user.name "ziad-zizo77"
          git config --global user.email "ziad-zizo77@users.noreply.github.com"
          git add .
          git commit -m "Update GitHub Stats" || echo "No changes"
          git push